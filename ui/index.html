<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornet Hive IDE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">🐝</span>
                <span class="text">Hive</span>
            </div>
            <nav>
                <button class="nav-item active" title="Explorer">📁</button>
                <button class="nav-item" title="Search">🔍</button>
                <button class="nav-item" title="Source Control">🌿</button>
                <button class="nav-item" title="Extensions">🧩</button>
            </nav>
            <div class="spacer"></div>
            <button class="nav-item" title="Settings">⚙️</button>
        </aside>

        <!-- Main Content -->
        <main class="main-container">
            <!-- Header -->
            <header class="header">
                <div class="file-info">
                    <span class="file-name">main.hn</span>
                    <span class="status">Edited</span>
                </div>
                <div class="actions">
                    <button id="run-btn" class="btn btn-primary">
                        <span class="icon">▶</span> Run
                    </button>
                </div>
            </header>

            <!-- Editor Area -->
            <div class="editor-workspace">
                <div id="editor-container"></div>
            </div>

            <!-- Console / Terminal -->
            <footer class="console">
                <div class="console-tabs">
                    <button class="tab active">Terminal</button>
                    <button class="tab">Output</button>
                    <button class="tab">Problems</button>
                </div>
                <div id="output" class="output-area">
                    <div class="line sys">> Executing 'main.hn'...</div>
                    <div class="line success">[BUILD] Compilation successful (0.32s)</div>
                    <div class="line success">[RUN] Check successful.</div>
                    <div class="line">Hello, Hornet!</div>
                </div>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
